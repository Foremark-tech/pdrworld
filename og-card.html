<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDR World Social Card</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Manrope:wght@800&display=swap');
        
        :root {
            --bg: #09090B;
            --accent: #E11D48;
            --text: #FFFFFF;
            --muted: #A1A1AA;
        }

        body {
            margin: 0;
            padding: 0;
            width: 1200px;
            height: 630px;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Abstract Background Decor */
        .decor {
            position: absolute;
            top: -100px;
            right: -100px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(225,29,72,0.15) 0%, rgba(9,9,11,0) 70%);
            z-index: 1;
        }

        .lines {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 10;
            text-align: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 40px;
            justify-content: center;
        }

        .logo-mark {
            background: var(--accent);
            color: #fff;
            font-family: 'Manrope', sans-serif;
            font-weight: 800;
            font-size: 64px;
            padding: 10px 30px;
            border-radius: 12px;
            letter-spacing: -2px;
        }

        .logo-text {
            font-family: 'Manrope', sans-serif;
            font-weight: 800;
            font-size: 80px;
            letter-spacing: -3px;
        }

        h1 {
            font-size: 48px;
            font-weight: 700;
            margin: 0;
            letter-spacing: -1px;
            max-width: 900px;
            line-height: 1.1;
        }

        p {
            font-size: 24px;
            color: var(--muted);
            margin-top: 24px;
            font-weight: 400;
        }

        .footer {
            position: absolute;
            bottom: 60px;
            display: flex;
            gap: 40px;
            font-size: 18px;
            font-weight: 600;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .badge {
            position: absolute;
            top: 60px;
            right: 60px;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 8px 16px;
            border-radius: 99px;
            font-size: 14px;
            font-weight: 700;
            color: var(--muted);
        }
    </style>
</head>
<body>
    <div class="lines"></div>
    <div class="decor"></div>
    <div class="badge">ISO 9001:2015 CERTIFIED</div>
    
    <div class="content">
        <div class="logo">
            <div class="logo-mark">PDR</div>
            <div class="logo-text">World</div>
        </div>
        <h1>Precision Fiber Optic Infrastructure</h1>
        <p>India's leading manufacturer of active & passive components since 1985.</p>
    </div>

    <div class="footer">
        <span>Active & Passive</span>
        <span>&bull;</span>
        <span>Test & Measuring</span>
        <span>&bull;</span>
        <span>Custom Solutions</span>
    </div>
</body>
</html>
